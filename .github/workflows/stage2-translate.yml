name: 'Stage 2: Translate and Rebuild'

on:
  push:
    paths:
      - '.github/workflows/stage2-translate.yml'
  workflow_dispatch:
    inputs:
      locales:
        description: 'Comma-separated locales to add'
        required: true
        default: 'zh-Hans'

jobs:
  translate_and_rebuild:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 'Enable Corepack'
        run: corepack enable

      - name: 'Read meta.json'
        id: meta
        run: |
          echo "buildCommand=$(jq -r '.buildCommand // "npx docusaurus build"' .github/scripts/meta.json)" >> $GITHUB_OUTPUT
          echo "buildOutput=$(jq -r '.buildOutput // "build"' .github/scripts/meta.json)" >> $GITHUB_OUTPUT
          echo "docusaurusRoot=$(jq -r '.docusaurusRoot // "."' .github/scripts/meta.json)" >> $GITHUB_OUTPUT

      - name: 'Add i18n locale config'
        run: |
          LOCALES="${{ github.event.inputs.locales }}"
          
          # Find docusaurus config file anywhere in the repo
          CONFIG_FILE=$(find . -name "docusaurus.config.*" -not -path "./node_modules/*" -not -path "./.git/*" | head -1)
          
          if [ -z "$CONFIG_FILE" ]; then
            echo "ERROR: No docusaurus.config found"
            exit 1
          fi
          echo "Config: $CONFIG_FILE"
          
          LOCALE_ARRAY=$(echo "$LOCALES" | tr ',' '\n' | sed "s/.*/'&'/" | tr '\n' ',' | sed 's/,$//')
          
          if ! grep -q "i18n" "$CONFIG_FILE"; then
            node -e "
            const fs = require('fs');
            let c = fs.readFileSync('$CONFIG_FILE', 'utf8');
            const i18n = \"\n  i18n: { defaultLocale: 'en', locales: ['en', ${LOCALE_ARRAY}] },\";
            const patterns = [
              /(module\.exports\s*=\s*\{)/,
              /(export\s+default\s*\{)/,
              /(const\s+config\s*[:=]\s*\{)/,
            ];
            let done = false;
            for (const p of patterns) {
              const m = c.match(p);
              if (m) { c = c.slice(0, m.index + m[0].length) + i18n + c.slice(m.index + m[0].length); done = true; break; }
            }
            if (!done) { console.log('WARNING: Could not find config pattern, trying first {'); const i = c.indexOf('{'); if (i >= 0) c = c.slice(0,i+1) + i18n + c.slice(i+1); }
            fs.writeFileSync('$CONFIG_FILE', c);
            console.log('Injected i18n config');
            "
          else
            echo "i18n config already exists"
          fi

      - name: 'Place translated files (placeholder copies)'
        run: |
          # Find where i18n/en lives
          I18N_EN=$(find . -path "*/i18n/en" -type d -not -path "./node_modules/*" | head -1)
          I18N_BASE=$(dirname "$I18N_EN" 2>/dev/null)  # parent of en = i18n dir
          
          # Find where docs live
          DOCS_DIR=$(find . -name "docs" -type d -maxdepth 3 -not -path "./node_modules/*" -not -path "./.git/*" -not -path "*/i18n/*" -not -path "*/build/*" | head -1)
          
          echo "i18n base: $I18N_BASE"
          echo "docs dir: $DOCS_DIR"
          
          for LOCALE in $(echo "${{ github.event.inputs.locales }}" | tr ',' ' '); do
            echo "Setting up locale: $LOCALE"
            
            if [ -n "$I18N_EN" ] && [ -d "$I18N_EN" ]; then
              DST="$I18N_BASE/$LOCALE"
              mkdir -p "$DST"
              cp -r "$I18N_EN/"* "$DST/"
              echo "  Copied $(find "$DST" -name '*.json' | wc -l) i18n JSON files"
            fi
            
            if [ -n "$DOCS_DIR" ] && [ -d "$DOCS_DIR" ]; then
              TARGET="$I18N_BASE/$LOCALE/docusaurus-plugin-content-docs/current"
              mkdir -p "$TARGET"
              cp -r "$DOCS_DIR/"* "$TARGET/"
              echo "  Copied $(find "$TARGET" -type f | wc -l) doc files"
            fi
          done

      - name: 'Rebuild'
        run: |
          if [ -f ".github/scripts/rebuild.sh" ]; then
            chmod +x .github/scripts/rebuild.sh
            bash .github/scripts/rebuild.sh
          else
            if [ -f "pnpm-lock.yaml" ]; then
              npm install -g pnpm && pnpm install --no-frozen-lockfile
            elif [ -f "yarn.lock" ]; then
              yarn install --frozen-lockfile 2>/dev/null || yarn install
            else
              npm install --legacy-peer-deps 2>/dev/null || npm install
            fi
            ${{ steps.meta.outputs.buildCommand }}
          fi

      - name: 'Verify and commit'
        run: |
          BUILD_OUTPUT="${{ steps.meta.outputs.buildOutput }}"
          echo "Build output dir: $BUILD_OUTPUT"
          
          # Find actual build output
          BUILD_DIR=""
          for d in "$BUILD_OUTPUT" "build" "public" "dist"; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              BUILD_DIR="$d"
              break
            fi
          done
          # Also check subdirs
          if [ -z "$BUILD_DIR" ]; then
            BUILD_DIR=$(find . -name "index.html" -path "*/$BUILD_OUTPUT/*" -not -path "./node_modules/*" -exec dirname {} \; | head -1)
          fi
          
          if [ -n "$BUILD_DIR" ]; then
            TOTAL=$(find "$BUILD_DIR" -type f | wc -l)
            echo "Build: $TOTAL files in $BUILD_DIR"
            for LOCALE in $(echo "${{ github.event.inputs.locales }}" | tr ',' ' '); do
              if [ -d "$BUILD_DIR/$LOCALE" ]; then
                echo "  $LOCALE: $(find "$BUILD_DIR/$LOCALE" -type f | wc -l) files"
              fi
            done
          else
            echo "WARNING: No build output found"
          fi
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # Force-add build output
          for dirname in build public dist out "$BUILD_OUTPUT"; do
            find . -name "$dirname" -type d -maxdepth 4 -not -path "./.git/*" | while read d; do
              [ -f "$d/index.html" ] && git add -f "$d/" || true
            done
          done
          if ! git diff --staged --quiet; then
            git commit --no-verify -m "Stage 2: translations (${{ github.event.inputs.locales }})"
            git push origin main
          fi
